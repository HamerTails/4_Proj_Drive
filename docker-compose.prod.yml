# SUPFile - docker-compose de production
# Differences vs docker-compose.yml :
#   - PAS de service mobile (Expo dev only)
#   - Limites memoire sur chaque service (VPS 2 Go RAM)
#   - Ports binds en localhost uniquement (Caddy fait le reverse proxy)
#   - VITE_API_URL pointe sur le domaine public
#
# Lancement :
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
      POSTGRES_USER: ${POSTGRES_USER:-supfile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis dans .env}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./api/database:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supfile -d supfile"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 400M
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - .env
    volumes:
      - storage_data:/data
      - avatars_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 400M
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.supfile.hackthehydra.com}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3001:80"
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
  avatars_data:
