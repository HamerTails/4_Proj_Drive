services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supfile}
      POSTGRES_USER: ${POSTGRES_USER:-supfile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis dans .env}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./api/database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supfile -d supfile"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: ./api
    env_file:
      - .env
    volumes:
      - storage_data:/data
      - avatars_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: on-failure

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "3001:80"

  mobile:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - api
    command: sh -c "npm install; npx expo start --host tunnel --port 8081"
    environment:
      EXPO_PUBLIC_API_URL: http://api:3000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true

volumes:
  db_data:
  storage_data:
  avatars_data:
  mobile_node_modules:
